name: Build & Push monitoreo-web-ui Frontend

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install deps & build React app (inside monitoreo-web-ui)
      - name: Install dependencies
        working-directory: monitoreo-web-ui
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          VITE_KC_URL: ${{ vars.VITE_KC_URL }}
          VITE_KC_REALM: ${{ vars.VITE_KC_REALM }}
          VITE_KC_CLIENT_ID: ${{ vars.VITE_KC_CLIENT_ID }}

      # 4. Build Docker image (context: monitoreo-web-ui)
      - name: Build Docker image
        run: |
          docker build -t leedmx/visor-viajes-ui:latest .

      # 5. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Push Docker image
      - name: Push Docker image
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          docker tag leedmx/visor-viajes-ui:latest leedmx/visor-viajes-ui:$SHORT_SHA
          docker push leedmx/visor-viajes-ui:latest
          docker push leedmx/visor-viajes-ui:$SHORT_SHA
